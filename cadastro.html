<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Novos Usuários</title>
</head>
<body style="background-color: #121212; color: #fff; font-family: Arial, sans-serif; padding: 40px;">
    <h2>Formulário de Cadastro de Usuário</h2>
    <form>
        <input type="text" placeholder="Nome Completo" style="padding: 8px; margin: 5px;"><br>
        <input type="email" placeholder="E-mail" style="padding: 8px; margin: 5px;"><br>
        <input type="password" placeholder="Defina uma Senha" style="padding: 8px; margin: 5px;"><br>
        <button type="submit" style="padding: 8px 15px; background-color: #00bfa5; border: none; cursor: pointer;">Cadastrar</button>
    </form>
</body>
</html>
